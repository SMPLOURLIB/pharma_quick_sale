<div class="pob-root pqs-dense-mode">
  <div class="pob-toolbar">
    <div class="pob-title">Pharma Operator Billing</div>
    <div class="pob-actions">
      <button class="btn btn-default btn-xs pob-load-cache">Load Cache</button>
      <button class="btn btn-default btn-xs pob-hold">F8 Hold</button>
      <button class="btn btn-default btn-xs pob-recall">F9 Recall</button>
      <button class="btn btn-primary btn-xs pob-submit">Ctrl+S Invoice</button>
    </div>
  </div>
  <div class="pob-header">
    <div><label>Customer</label><input class="form-control pob-customer" placeholder="F6 Customer / cash customer"></div>
    <div><label>Company</label><input class="form-control pob-company" placeholder="Company"></div>
    <div><label>Warehouse</label><input class="form-control pob-warehouse" placeholder="Warehouse"></div>
    <div><label>Search / Barcode</label><input class="form-control pob-search" placeholder="Scan or search item (Ctrl+F)"></div>
  </div>
  <div class="pob-suggestions"></div>
  <table class="table table-bordered pob-grid">
    <thead>
      <tr>
        <th>#</th><th>Item</th><th>Batch</th><th>Exp</th><th>Qty</th><th>Free</th><th>Rate</th><th>Disc %</th><th>GST</th><th>Amount</th><th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="pob-footer">
    <div class="pob-status">Ready</div>
    <div class="pob-totals">
      <span>Lines: <b class="pob-line-count">0</b></span>
      <span>Qty: <b class="pob-total-qty">0</b></span>
      <span>Total: <b class="pob-grand-total">0.00</b></span>
    </div>
  </div>
</div>
